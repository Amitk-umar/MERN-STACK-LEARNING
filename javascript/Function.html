<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function</title>
    <script>

        //Function Definition
        function intro(username ,profession,age) {
            // console.log(typeof username)
            console.log('Hii,')
            console.log(`My name is ${username} || 'Amit developer'.`)  //default parameter
            console.log(`I am a ${profession}.`)
            console.log(`I'am ${age} years old.`)
            // return 'amit'
        }
        //Calling Function
        // const returnValue = intro()

        intro('Amit Maurya','Software engineer',22)
        intro('Akash singh','Mechanical engineer',26)

    </script>
</head>

<body style="font-family: cursive;">
    <h1>Introduction of Function</h1>

</body>

</html>
