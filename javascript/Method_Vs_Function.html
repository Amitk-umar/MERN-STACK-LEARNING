<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Method Vs Function</title>
</head>

<body>
    <script>
        const maths = {

            E: 2.718281828459045,
            add: function(a, b) {
                return a + b
            },
            square:function(a){
                return a*a
            },
            subtract(a,b){  //ES6 feature
                return a-b
            },
            cube(num){
                return num**3
            }
        }



    </script>
</body>

</html>
