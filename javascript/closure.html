<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>closure</title>
</head>

<body>
    <h1>Returning function with closure</h1>
    <script>
        // debugger
        function grandParent() {

            const a = 10
            function parent() {
                const b = 20
                function add() {
                    console.log(a + b)
                }
                return add()
            }
            return parent()
        }
        // console.dir(add)

        const add1 = grandParent()
        console.dir(add1)
    </script>
</body>

</html>
