<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>do while</title>
</head>

<body>
    <h1>Do while</h1>
    <script>
        console.log('Program Start')

        debugger
        let i = 1
        do {

            console.log(i)
            i++

        } while (i <= 5);

        console.log('Program End')

    </script>
</body>

</html>
